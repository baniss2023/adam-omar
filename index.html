<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Adam & Omar - Compteur</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    body {
      overflow-y: auto;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: clamp(14px, 3vw, 32px);
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 3vw, 26px);
    }

    .titre {
      text-align: center;
      font-size: clamp(42px, 9vw, 92px);
      font-weight: 900;
      line-height: 1.05;
      margin: 0;
      word-break: break-word;
    }

    .conteneur {
      width: 100%;
      max-width: 1150px;
      margin: 0 auto;
    }

    .carte {
      width: 100%;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: clamp(18px, 3vw, 32px);
      padding: clamp(18px, 4vw, 36px);
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.35);
    }

    .ligne-valeurs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(14px, 3vw, 28px);
    }

    .bloc {
      min-width: 0;
      background: rgba(255, 255, 255, 0.08);
      border-radius: clamp(16px, 2.5vw, 26px);
      padding: clamp(16px, 3vw, 28px);
    }

    .label {
      font-size: clamp(20px, 3.6vw, 34px);
      font-weight: 700;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .valeur {
      font-size: clamp(44px, 9vw, 110px);
      font-weight: 900;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .argent {
      color: #22c55e;
    }

    .infos {
      margin-top: clamp(16px, 3vw, 28px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 2vw, 18px);
    }

    .info {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: clamp(12px, 2.5vw, 20px);
      text-align: center;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 700;
      line-height: 1.25;
    }

    .info span {
      display: block;
      margin-top: 6px;
      font-size: clamp(20px, 3.5vw, 34px);
      color: #facc15;
      font-variant-numeric: tabular-nums;
    }

    .boutons {
      width: 100%;
      max-width: 1150px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 2vw, 18px);
    }

    button {
      width: 100%;
      min-height: clamp(58px, 9vw, 86px);
      border: none;
      border-radius: 18px;
      padding: 12px;
      font-size: clamp(20px, 3.5vw, 34px);
      font-weight: 900;
      cursor: pointer;
      color: white;
    }

    #demarrer {
      background: #2563eb;
    }

    #pause {
      background: #f59e0b;
    }

    #reset {
      background: #64748b;
    }

    button:active {
      transform: scale(0.98);
    }

    .etat {
      width: 100%;
      max-width: 1150px;
      margin: 0 auto;
      text-align: center;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 700;
      opacity: 0.9;
      line-height: 1.3;
    }

    @media (max-width: 850px) {
      .ligne-valeurs {
        grid-template-columns: 1fr;
      }

      .infos {
        grid-template-columns: 1fr;
      }

      .boutons {
        grid-template-columns: 1fr;
      }

      .valeur {
        font-size: clamp(48px, 14vw, 96px);
      }
    }

    @media (orientation: landscape) and (max-height: 620px) {
      .page {
        min-height: auto;
      }

      .titre {
        font-size: clamp(34px, 7vw, 64px);
      }

      .carte {
        padding: 18px;
      }

      .bloc {
        padding: 16px;
      }

      .valeur {
        font-size: clamp(38px, 7vw, 76px);
      }

      button {
        min-height: 54px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1 class="titre">Adam &amp; Omar</h1>

    <section class="conteneur">
      <div class="carte">
        <div class="ligne-valeurs">
          <div class="bloc">
            <div class="label">Temps écoulé</div>
            <div id="temps" class="valeur">00:00:00</div>
          </div>

          <div class="bloc">
            <div class="label">Montant gagné</div>
            <div id="argent" class="valeur argent">0.00 $</div>
          </div>
        </div>

        <div class="infos">
          <div class="info">
            Salaire par heure
            <span>30.00 $</span>
          </div>

          <div class="info">
            Salaire par minute
            <span id="salaireMinute">0.50 $</span>
          </div>

          <div class="info">
            État du compteur
            <span id="etatCourt">Arrêté</span>
          </div>
        </div>
      </div>
    </section>

    <section class="boutons">
      <button id="demarrer">Démarrer</button>
      <button id="pause">Pause</button>
      <button id="reset">Remettre à zéro</button>
    </section>

    <div id="etatLong" class="etat">
      Le compteur est arrêté. Appuie sur Démarrer pour commencer.
    </div>
  </main>

  <script>
    const salaireParHeure = 30;
    const salaireParMinute = salaireParHeure / 60;
    const salaireParSeconde = salaireParHeure / 3600;

    let tempsDepart = null;
    let tempsCumule = 0;
    let compteurActif = false;

    const tempsElement = document.getElementById("temps");
    const argentElement = document.getElementById("argent");
    const salaireMinuteElement = document.getElementById("salaireMinute");
    const etatCourtElement = document.getElementById("etatCourt");
    const etatLongElement = document.getElementById("etatLong");

    const boutonDemarrer = document.getElementById("demarrer");
    const boutonPause = document.getElementById("pause");
    const boutonReset = document.getElementById("reset");

    salaireMinuteElement.textContent = salaireParMinute.toFixed(2) + " $";

    function formaterTemps(totalSecondes) {
      const heures = Math.floor(totalSecondes / 3600);
      const minutes = Math.floor((totalSecondes % 3600) / 60);
      const secondes = Math.floor(totalSecondes % 60);

      return String(heures).padStart(2, "0") + ":" +
             String(minutes).padStart(2, "0") + ":" +
             String(secondes).padStart(2, "0");
    }

    function obtenirTempsTotal() {
      let tempsTotal = tempsCumule;

      if (compteurActif) {
        tempsTotal += (Date.now() - tempsDepart) / 1000;
      }

      return tempsTotal;
    }

    function mettreAJourAffichage() {
      const tempsTotal = obtenirTempsTotal();
      const montant = tempsTotal * salaireParSeconde;

      tempsElement.textContent = formaterTemps(tempsTotal);
      argentElement.textContent = montant.toFixed(2) + " $";

      if (compteurActif) {
        etatCourtElement.textContent = "En marche";
        etatLongElement.textContent = "Le compteur est en marche. Le montant augmente selon 30 $ par heure.";
      } else {
        etatCourtElement.textContent = "Arrêté";
        etatLongElement.textContent = "Le compteur est arrêté. Appuie sur Démarrer pour continuer.";
      }

      requestAnimationFrame(mettreAJourAffichage);
    }

    boutonDemarrer.addEventListener("click", function () {
      if (!compteurActif) {
        tempsDepart = Date.now();
        compteurActif = true;
      }
    });

    boutonPause.addEventListener("click", function () {
      if (compteurActif) {
        tempsCumule += (Date.now() - tempsDepart) / 1000;
        compteurActif = false;
      }
    });

    boutonReset.addEventListener("click", function () {
      tempsDepart = null;
      tempsCumule = 0;
      compteurActif = false;
    });

    mettreAJourAffichage();
  </script>
</body>
</html>
